name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: wyvox/action-setup-pnpm@v3
        with:
          node-version: lts/*
          args: --ignore-scripts
      - name: Run Eslint
        run: pnpm eslint "{src,apps,libs,test}/**/*.ts"
  test:
    name: Run tests
    runs-on: ubuntu-latest
    services:
      minio:
        image: ghcr.io/11notes/minio:2025.10.15-nobody
        command: /data
        env:
          MINIO_ROOT_USER: Junius2
          MINIO_ROOT_PASSWORD: lorem-deserunt-nisi-pariatur-nulla-mollit-velit
        ports:
          - "9000:9000"
        volumes:
          - minio_data:/data
      postgres:
        image: ghcr.io/11notes/postgres:18
        env:
          POSTGRES_PASSWORD: mollit-non-dolor-laboris
        ports:
          - "5432:5432"
      integresql:
        image: allaboutapps/integresql
        env:
          PGUSER: postgres
          PGPASSWORD: mollit-non-dolor-laboris
          PGDATABASE: postgres
          PGHOST: postgres
          PGPORT: "5432"
          PGSSLMODE: disable
        ports:
          - "5000:5000"
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: wyvox/action-setup-pnpm@v3
        with:
          node-version: lts/*
          args: --frozen-lockfile
      - name: Run tests
        run: pnpm test
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: mollit-non-dolor-laboris
          POSTGRES_DB: postgres
          POSTGRES_HOST: localhost
          INTEGRESQL_BASE_URL: http://localhost:5000
          COOKIE_SECRET: laborum-nisi-laboris-aliqua-duis-ullamco-tempor-fugiat
          JWT_SECRET: fugiat-sunt-ullamco-id-nulla-occaecat-lorem-aliquip-nostrud-irure-culpa-aliquip-qui-labore
          MINIO_END_POINT: localhost
          MINIO_ACCESS_KEY: Junius2
          MINIO_SECRET_KEY: lorem-deserunt-nisi-pariatur-nulla-mollit-velit
          MINIO_PORT: 9000
